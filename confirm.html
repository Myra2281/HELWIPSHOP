<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Підтвердження замовлення — Helwip Merch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#0e0f13; --card:#1a1c23; --border:rgba(255,255,255,0.08);
    --orange:#ff7a45; --green:#4fbf67; --red:#ef5b5b;
    --ink:#f3f4f7; --ink-dim:#8b8e9b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--ink);
    font-family:'Inter',sans-serif; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:20px;
    padding:36px 28px; max-width:400px; width:100%; text-align:center;
  }
  .icon{font-size:52px; margin-bottom:8px;}
  h1{font-size:20px; margin:0 0 10px;}
  p{color:var(--ink-dim); font-size:14.5px; line-height:1.6; margin:0;}
  .order-id{color:var(--ink-dim); font-size:12px; margin-top:18px; font-family:monospace;}
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon">⏳</div>
    <h1>Обробляємо…</h1>
    <p>Зачекайте секунду.</p>
  </div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDoE8kEXqqBnqIo92MQ5R7e36OTbyc_1Fk",
    authDomain: "helwip.firebaseapp.com",
    projectId: "helwip",
    storageBucket: "helwip.firebasestorage.app",
    messagingSenderId: "947863318055",
    appId: "1:947863318055:web:5dc455813bbeaf79086802",
    measurementId: "G-2JCLYW5GWD"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const FB_COLLECTION = 'helwip-store';
  const ORDERS_KEY = 'helwip-orders';

  function render(icon, title, text){
    document.getElementById('card').innerHTML = `
      <div class="icon">${icon}</div>
      <h1>${title}</h1>
      <p>${text}</p>
    `;
  }

  async function confirmOrder(){
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('order');

    if(!orderId){
      render('⚠️', 'Немає ID замовлення', 'Це посилання виглядає неповним.');
      return;
    }

    try{
      const docRef = db.collection(FB_COLLECTION).doc(ORDERS_KEY);
      const snap = await docRef.get();
      if(!snap.exists || !snap.data().json){
        render('⚠️', 'Замовлення не знайдено', 'Можливо, база даних порожня або сталася помилка.');
        return;
      }

      const orders = JSON.parse(snap.data().json);
      const order = orders.find(o => o.id === orderId);

      if(!order){
        render('⚠️', 'Замовлення не знайдено', 'Можливо, воно вже було видалене.');
        return;
      }

      if(order.status === 'confirmed'){
        render('✅', 'Уже підтверджено', `Замовлення ${order.name} (${order.total} грн) вже було підтверджене раніше.`);
        return;
      }

      order.status = 'confirmed';
      await docRef.set({ json: JSON.stringify(orders), updatedAt: Date.now() });

      render('✅', 'Замовлення підтверджено!', `${order.name} · ${order.total} грн<br>Статус оновлено в адмін-панелі сайту.`);
    }catch(e){
      console.error(e);
      render('❌', 'Помилка', 'Не вдалося зв\'язатися з базою даних. Спробуйте ще раз.');
    }
  }

  confirmOrder();
</script>
</body>
</html>
