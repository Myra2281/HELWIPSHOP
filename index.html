<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helwip Merch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0f13;
    --bg-soft:#15171d;
    --card:#1a1c23;
    --card-hover:#20222b;
    --border:rgba(255,255,255,0.08);
    --border-soft:rgba(255,255,255,0.05);
    --orange:#ff7a45;
    --orange-dim:#ff7a4522;
    --blue:#4fa8ff;
    --gold:#ffcb52;
    --green:#4fbf67;
    --red:#ef5b5b;
    --ink:#f3f4f7;
    --ink-dim:#8b8e9b;
    --body: 'Inter', system-ui, -apple-system, sans-serif;
    --radius: 14px;
    --radius-sm: 8px;
    --ease: cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--body);
    padding-bottom:100px;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--orange);color:#1a1a1a;}
  a{color:var(--blue); text-decoration:none;}

  /* ---------- HEADER ---------- */
  header.site{
    position:sticky; top:0; z-index:40;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 32px;
    background:rgba(14,15,19,0.75);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand .mark{
    width:36px; height:36px; border-radius:10px;
    background:linear-gradient(135deg, var(--orange), var(--blue));
    display:flex; align-items:center; justify-content:center;
    font-size:14px; color:#0d0d0d; font-weight:800; letter-spacing:0.5px;
  }
  .brand .name{font-size:16px; font-weight:700; letter-spacing:0.2px; color:var(--blue);}
  .brand .name span{color:var(--orange);}
  nav.top{display:flex; align-items:center; gap:22px;}
  nav.top a{color:var(--ink-dim); font-weight:500; font-size:14px; transition:color .2s var(--ease);}
  nav.top a:hover{color:var(--ink);}

  .edit-toggle{
    font-family:var(--body); font-size:13px; font-weight:600;
    background:var(--card); color:var(--ink);
    border:1px solid var(--border); border-radius:999px; padding:8px 16px; cursor:pointer;
    transition:transform .15s var(--ease), background .2s var(--ease), border-color .2s var(--ease), box-shadow .2s var(--ease);
  }
  .edit-toggle:hover{background:var(--card-hover); border-color:rgba(255,255,255,0.16); transform:translateY(-1px);}
  .edit-toggle:active{transform:translateY(0) scale(0.96);}
  .edit-toggle.on{background:var(--gold); color:#1a1a1a; border-color:var(--gold); animation:softPulse 2.2s ease-in-out infinite;}

  @keyframes softPulse{
    0%,100%{box-shadow:0 0 0 0 rgba(255,203,82,0.45);}
    50%{box-shadow:0 0 0 6px rgba(255,203,82,0);}
  }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    margin:32px 32px 48px;
    border-radius:20px;
    overflow:hidden;
    padding:88px 40px;
    text-align:center;
    background:
      radial-gradient(ellipse 70% 60% at 30% 0%, rgba(255,122,69,0.16) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 80% 10%, rgba(79,168,255,0.12) 0%, transparent 60%),
      var(--bg-soft);
    border:1px solid var(--border);
  }
  .hero-inner{position:relative; z-index:2;}
  .eyebrow{
    font-size:13px; font-weight:700; color:var(--gold);
    letter-spacing:2.5px; text-transform:uppercase;
  }
  h1.hero-title{
    font-size:clamp(28px, 5vw, 48px);
    font-weight:800;
    line-height:1.25;
    margin:16px 0;
    letter-spacing:-0.5px;
  }
  h1.hero-title .a{color:var(--orange);}
  h1.hero-title .b{color:var(--blue);}
  p.hero-sub{
    font-size:17px; color:var(--ink-dim); max-width:560px; margin:0 auto 30px;
    line-height:1.6;
  }
  .mc-btn{
    font-family:var(--body); font-size:15px; font-weight:700;
    background:var(--orange); color:#1a0d05;
    border:none; border-radius:999px; padding:13px 30px; cursor:pointer;
    letter-spacing:0.2px;
    transition:transform .18s var(--ease), box-shadow .25s var(--ease), background .2s var(--ease), filter .2s var(--ease);
    box-shadow:0 2px 0 rgba(0,0,0,0.15), 0 6px 18px rgba(255,122,69,0.0);
    position:relative; overflow:hidden;
  }
  .mc-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 4px 0 rgba(0,0,0,0.15), 0 10px 22px rgba(255,122,69,0.32);
    filter:brightness(1.06);
  }
  .mc-btn:active{
    transform:translateY(0) scale(0.96);
    box-shadow:0 1px 0 rgba(0,0,0,0.15);
  }
  .mc-btn.secondary{background:var(--card); color:var(--ink); border:1px solid var(--border);}
  .mc-btn.secondary:hover{box-shadow:0 8px 18px rgba(0,0,0,0.35);}
  .mc-btn.small{font-size:13px; padding:8px 16px;}
  .mc-btn.danger{background:var(--red); color:#2a0000;}
  .mc-btn.danger:hover{box-shadow:0 10px 22px rgba(239,91,91,0.32);}
  .mc-btn.secondary.on{background:var(--orange); color:#1a0d05; border-color:var(--orange);}

  /* editable affordance */
  .editable{position:relative; outline-offset:6px; transition:background .2s var(--ease);}
  body.edit-mode .editable{outline:1.5px dashed rgba(255,203,82,0.45); cursor:text; border-radius:6px;}
  body.edit-mode .editable:hover{outline-color:var(--gold); background:rgba(255,203,82,0.06);}
  .pencil{
    display:none;
    position:absolute; top:-10px; right:-10px;
    width:22px; height:22px; border-radius:50%;
    background:var(--gold); color:#222; font-size:12px;
    align-items:center; justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.4);
    transition:transform .15s var(--ease);
  }
  body.edit-mode .editable .pencil{display:flex;}
  body.edit-mode .editable:hover .pencil{transform:scale(1.15) rotate(-8deg);}

  /* ---------- SECTION LABEL ---------- */
  .section-label{
    display:flex; align-items:center; gap:16px;
    margin:0 32px 20px;
  }
  .section-label .tag{
    font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--ink-dim);
  }
  .section-label .line{flex:1; height:1px; background:var(--border);}

  /* ---------- INVENTORY / SHOP ---------- */
  .inventory{
    margin:0 32px 56px;
  }
  .inv-header{
    display:flex; justify-content:space-between; align-items:center;
    color:var(--ink); font-size:20px; font-weight:700; margin-bottom:18px;
  }
  .inv-header span:last-child{font-size:13px; font-weight:500; color:var(--ink-dim);}
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:16px;
  }
  .slot{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:0;
    display:flex; flex-direction:column;
    position:relative;
    overflow:hidden;
    transition:transform .22s var(--ease), border-color .22s var(--ease), box-shadow .22s var(--ease);
  }
  .slot:hover{
    transform:translateY(-4px);
    border-color:rgba(255,255,255,0.16);
    box-shadow:0 14px 30px rgba(0,0,0,0.35);
  }
  .slot .icon{
    width:100%; aspect-ratio:1/1;
    background:#f5f5f7;
    display:flex; align-items:center; justify-content:center;
    font-size:110px;
    overflow:hidden;
  }
  .slot .icon img{width:100%; height:100%; object-fit:contain; padding:12px;}
  .slot .body{
    padding:18px 20px 20px;
    display:flex; flex-direction:column; gap:9px;
  }
  .slot .pname{
    font-weight:700; color:var(--ink); font-size:17px; line-height:1.3;
  }
  .slot .pdesc{
    color:var(--ink-dim); font-size:13.5px; line-height:1.5; min-height:38px;
  }
  .slot .pprice{
    font-size:20px; font-weight:800; color:var(--orange);
  }
  .slot .add-btn{
    font-family:var(--body); font-size:15px; font-weight:700;
    background:var(--bg-soft); color:var(--ink); border:1px solid var(--border);
    border-radius:999px;
    padding:11px 0; cursor:pointer;
    transition:transform .15s var(--ease), background .2s var(--ease), box-shadow .2s var(--ease);
  }
  .slot .add-btn:hover{background:var(--orange); color:#1a0d05; border-color:var(--orange); box-shadow:0 8px 18px rgba(255,122,69,0.3);}
  .slot .add-btn:active{transform:scale(0.95);}
  .slot .add-btn.added{background:var(--green); color:#0d1f0d; border-color:var(--green); animation:addBounce .35s var(--ease);}
  @keyframes addBounce{
    0%{transform:scale(1);}
    40%{transform:scale(1.08);}
    100%{transform:scale(1);}
  }
  .slot .remove-slot{
    position:absolute; top:8px; right:8px; z-index:2;
    background:var(--card); color:var(--red); border:1px solid var(--border);
    border-radius:50%;
    width:24px; height:24px; font-size:12px; cursor:pointer; display:none;
    transition:transform .15s var(--ease), background .2s var(--ease);
  }
  .slot .remove-slot:hover{background:var(--red); color:#fff; transform:scale(1.1);}
  body.edit-mode .slot .remove-slot{display:block;}
  body.edit-mode .slot .editable:hover{background:rgba(255,203,82,0.1);}
  .add-slot{
    background:transparent;
    border:1.5px dashed var(--border);
    border-radius:var(--radius);
    display:none;
    align-items:center; justify-content:center;
    min-height:230px;
    font-size:14px; font-weight:600; color:var(--ink-dim);
    cursor:pointer;
    transition:border-color .2s var(--ease), color .2s var(--ease), transform .2s var(--ease);
  }
  .add-slot:hover{border-color:var(--orange); color:var(--orange); transform:translateY(-2px);}
  body.edit-mode .add-slot{display:flex;}

  /* ---------- PRODUCT DETAIL PAGE ---------- */
  .product-page{
    max-width:1100px; margin:0 auto; padding:24px 32px 60px;
    animation:fadeIn .25s var(--ease);
  }
  .back-btn{
    display:inline-flex; align-items:center; gap:6px;
    background:transparent; border:1px solid var(--border); color:var(--ink-dim);
    font-family:var(--body); font-size:13.5px; font-weight:600;
    border-radius:999px; padding:8px 16px; cursor:pointer; margin-bottom:24px;
    transition:transform .15s var(--ease), border-color .2s var(--ease), color .2s var(--ease);
  }
  .back-btn:hover{border-color:rgba(255,255,255,0.2); color:var(--ink); transform:translateX(-3px);}
  .pp-grid{
    display:grid; grid-template-columns:1.15fr 1fr; gap:52px; align-items:start;
  }
  .pp-gallery{display:flex; gap:14px;}
  .pp-thumbs{
    display:flex; flex-direction:column; gap:10px; flex-shrink:0;
  }
  .pp-thumb{
    width:68px; height:68px; border-radius:10px; overflow:hidden;
    background:#f5f5f7; border:2px solid transparent; cursor:pointer;
    transition:border-color .2s var(--ease), transform .15s var(--ease);
  }
  .pp-thumb img{width:100%; height:100%; object-fit:contain;}
  .pp-thumb:hover{transform:translateY(-2px);}
  .pp-thumb.active{border-color:var(--orange);}
  .pp-image{
    flex:1;
    aspect-ratio:1/1;
    background:#f5f5f7; border-radius:var(--radius);
    display:flex; align-items:center; justify-content:center;
    font-size:170px; overflow:hidden;
  }
  .pp-image img{width:100%; height:100%; object-fit:contain; padding:28px;}
  .pp-name{
    font-size:26px; font-weight:800; margin:0 0 14px; letter-spacing:-0.2px;
    font-style:italic; text-transform:uppercase; line-height:1.25;
  }
  .pp-price{font-size:22px; font-weight:800; color:var(--ink); margin-bottom:18px;}
  .pp-desc{color:var(--ink-dim); font-size:14.5px; line-height:1.7; margin-bottom:26px;}
  .pp-row{display:flex; gap:10px; margin-bottom:8px;}
  .pp-qty-select{
    width:76px; flex-shrink:0;
    background:var(--card); color:var(--ink); border:1px solid var(--border);
    border-radius:999px; font-size:15px; font-weight:700; text-align:center;
    padding:0 10px; cursor:pointer;
  }
  .pp-add{flex:1;}
  .pp-accordion{margin-top:30px; border-top:1px solid var(--border);}
  .pp-acc-item{border-bottom:1px solid var(--border);}
  .pp-acc-head{
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 2px; cursor:pointer; font-size:12.5px; font-weight:800;
    letter-spacing:1px; text-transform:uppercase; color:var(--ink);
    font-style:italic;
  }
  .pp-acc-plus{
    font-size:16px; color:var(--ink-dim); transition:transform .25s var(--ease);
    font-style:normal;
  }
  .pp-acc-item.open .pp-acc-plus{transform:rotate(45deg); color:var(--orange);}
  .pp-acc-body{
    max-height:0; overflow:hidden; color:var(--ink-dim); font-size:13.5px; line-height:1.6;
    transition:max-height .25s var(--ease), padding .25s var(--ease);
    padding:0 2px;
  }
  .pp-acc-item.open .pp-acc-body{max-height:200px; padding:0 2px 16px;}
  .pp-sizes{display:flex; flex-wrap:wrap; gap:8px;}
  .pp-size-chip{
    display:inline-flex; align-items:center; justify-content:center;
    min-width:36px; height:32px; padding:0 8px;
    border:1px solid var(--border); border-radius:8px;
    font-size:12.5px; font-weight:700; color:var(--ink);
    background:var(--card);
  }
  .pp-size-chip.unavailable{
    color:var(--ink-dim); text-decoration:line-through; opacity:0.45;
    background:transparent; cursor:not-allowed;
  }
  .pp-size-chip:not(.unavailable){cursor:pointer; transition:transform .12s var(--ease), background .15s var(--ease), border-color .15s var(--ease);}
  .pp-size-chip:not(.unavailable):hover{border-color:var(--orange); transform:translateY(-1px);}
  .pp-size-chip.selected{background:var(--orange); color:#1a0d05; border-color:var(--orange);}
  @media (max-width:720px){
    .pp-grid{grid-template-columns:1fr; gap:24px;}
    .product-page{padding:20px 16px 50px;}
    .pp-image{font-size:110px;}
    .pp-gallery{flex-direction:column-reverse;}
    .pp-thumbs{flex-direction:row; overflow-x:auto;}
  }

  /* ---------- ABOUT / FOOTER ---------- */
  .about{
    margin:0 32px 56px; text-align:center;
  }
  .about .editable{max-width:640px; margin:0 auto; color:var(--ink-dim); line-height:1.7; font-size:15.5px;}
  footer.site{
    text-align:center; padding:34px 20px; color:var(--ink-dim);
    font-size:13px; border-top:1px solid var(--border);
  }
  footer.site a{font-weight:600;}

  /* ---------- HOTBAR / CART ---------- */
  .cart-fab{
    position:fixed; right:22px; bottom:22px; z-index:55;
    width:58px; height:58px; border-radius:50%;
    background:var(--orange); border:none; color:#1a0d05;
    font-size:24px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; box-shadow:0 12px 28px rgba(255,122,69,0.4);
    transition:transform .18s var(--ease), box-shadow .18s var(--ease);
  }
  .cart-fab:hover{transform:translateY(-2px); box-shadow:0 16px 34px rgba(255,122,69,0.5);}
  .cart-fab:active{transform:scale(0.94);}
  .cart-fab-count{
    position:absolute; top:-4px; right:-4px;
    background:var(--gold); color:#1a1a1a; font-size:12px; font-weight:800;
    min-width:22px; height:22px; border-radius:999px; display:none; align-items:center; justify-content:center;
    padding:0 5px; border:3px solid var(--bg);
  }

  /* ---------- CART PANEL ---------- */
  .cart-panel-backdrop{
    position:fixed; inset:0; z-index:59; background:rgba(0,0,0,0.5);
    display:none; opacity:0; transition:opacity .2s var(--ease);
  }
  .cart-panel-backdrop.open{display:block; opacity:1;}
  .cart-panel{
    position:fixed; right:20px; bottom:90px; z-index:60;
    width:320px; max-width:90vw;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
    padding:18px;
    display:none;
    opacity:0; transform:translateY(8px) scale(0.98);
    transition:opacity .2s var(--ease), transform .2s var(--ease);
    max-height:70vh; overflow-y:auto;
  }
  .cart-panel.open{display:block; opacity:1; transform:translateY(0) scale(1);}
  .cart-panel h3{margin:0 0 12px; font-size:16px; font-weight:700; color:var(--ink);}
  .cart-row{
    display:flex; justify-content:space-between; align-items:center;
    font-size:13.5px; color:var(--ink); padding:8px 0; border-bottom:1px solid var(--border-soft);
  }
  .cart-row .x{cursor:pointer; color:var(--red); font-weight:700; margin-left:8px; transition:transform .15s var(--ease);}
  .cart-row .x:hover{transform:scale(1.25);}
  .cart-total{
    display:flex; justify-content:space-between; margin-top:12px; font-size:16px; font-weight:800; color:var(--ink);
  }
  .cart-empty{color:var(--ink-dim); font-size:13.5px; padding:12px 0;}

  /* ---------- MODAL ---------- */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:100;
    display:none; align-items:center; justify-content:center;
    backdrop-filter:blur(3px);
  }
  .modal-backdrop.open{display:flex; animation:fadeIn .18s var(--ease);}
  @keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
  .modal{
    background:var(--card); color:var(--ink); padding:24px; width:360px; max-width:90vw;
    border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:0 25px 60px rgba(0,0,0,0.5);
    animation:modalPop .2s var(--ease);
    max-height:85vh; overflow-y:auto;
  }
  @keyframes modalPop{
    from{opacity:0; transform:scale(0.94) translateY(8px);}
    to{opacity:1; transform:scale(1) translateY(0);}
  }
  .modal h3{margin-top:0; font-size:18px; font-weight:700;}
  .modal label{display:block; font-size:12px; font-weight:600; color:var(--ink-dim); margin:12px 0 5px;}
  .modal input, .modal textarea, .modal select{
    width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-sm);
    font-family:var(--body); font-size:14px;
    background:var(--bg-soft); color:var(--ink);
    transition:border-color .2s var(--ease), box-shadow .2s var(--ease);
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus{
    outline:none; border-color:var(--orange); box-shadow:0 0 0 3px rgba(255,122,69,0.18);
  }
  .modal textarea{resize:vertical; min-height:60px;}
  .modal .row{display:flex; gap:10px; margin-top:18px;}

  .toast{
    position:fixed; top:76px; left:50%; transform:translateX(-50%) translateY(-8px);
    background:var(--gold); color:#1a1a1a; padding:11px 20px; border-radius:999px;
    font-weight:700; font-size:13.5px; z-index:200; box-shadow:0 10px 25px rgba(0,0,0,0.4);
    display:none; opacity:0;
    transition:opacity .2s var(--ease), transform .2s var(--ease);
  }
  .toast.show{display:block; opacity:1; transform:translateX(-50%) translateY(0);}

  .loading-banner{
    text-align:center; padding:40px; color:var(--ink-dim); font-size:15px;
  }

  @media (max-width:640px){
    header.site{padding:12px 16px;}
    .hero{padding:56px 20px; margin:16px;}
    .inventory{margin:0 16px 36px;}
    .grid{grid-template-columns:repeat(auto-fill, minmax(140px,1fr));}
    .section-label{margin:0 16px 16px;}
    .cart-fab{ right:16px; bottom:calc(16px + env(safe-area-inset-bottom, 0px)); }
    .cart-panel{
      left:0; right:0; bottom:0; top:auto;
      width:100%; max-width:100%;
      border-radius:20px 20px 0 0;
      max-height:80vh;
      padding:20px 20px calc(20px + env(safe-area-inset-bottom, 0px));
      transform:translateY(100%);
    }
    .cart-panel.open{transform:translateY(0);}
    .about{margin:0 16px 36px;}
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>

<header class="site">
  <div class="brand">
    <div class="mark">HW</div>
    <div class="name">HEL<span>WIP</span></div>
  </div>
  <nav class="top">
    <a href="#shop">Магазин</a>
    <a href="#about">Про канал</a>
    <button class="edit-toggle" id="ordersToggleBtn" style="display:none;">📋 Замовлення</button>
    <button class="edit-toggle" id="changePassBtn" style="display:none;">🔒 Пароль</button>
    <button class="edit-toggle" id="editToggleBtn" style="display:none;">✎ Редагувати</button>
    <button class="edit-toggle" id="authToggleBtn">🔑 Вхід / Реєстрація</button>

<script>
const SITE_KEY = 'helwip-site-content';

// Telegram-сповіщення про нові замовлення (заповниш після налаштування бота)

async function sendTelegramNotification(order){
  if(TELEGRAM_BOT_TOKEN.includes('ВАШ_ТОКЕН') || TELEGRAM_CHAT_ID.includes('ВАШ_CHAT_ID')){
    console.log('Telegram-сповіщення не налаштовано — див. інструкцію');

  }

// ---------- Firebase (справжня база даних, працює на будь-якому хостингу) ----------
const firebaseConfig = {
  apiKey: "AIzaSyDoE8kEXqqBnqIo92MQ5R7e36OTbyc_1Fk",
  authDomain: "helwip.firebaseapp.com",
  projectId: "helwip",
  storageBucket: "helwip.firebasestorage.app",
  messagingSenderId: "947863318055",
  appId: "1:947863318055:web:5dc455813bbeaf79086802",
  measurementId: "G-2JCLYW5GWD"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const FB_COLLECTION = 'helwip-store';

async function fbGetJson(key){
  const snap = await db.collection(FB_COLLECTION).doc(key).get();
  if(snap.exists && snap.data() && snap.data().json !== undefined) return snap.data().json;
  return null;
}

async function fbSetJson(key, jsonStr){
  await db.collection(FB_COLLECTION).doc(key).set({ json: jsonStr, updatedAt: Date.now() });
}

const defaultContent = {
  eyebrow: "офіційний мерч",
  heroTitle: 'Стань <span class="a">Богом</span> у <span class="b">Майнкрафті</span>',
  heroSub: "Кастомний мерч від Helwip — для тих, хто дивиться до кінця кожне відео і виживає в океані разом з нами.",
  aboutText: "Всім привіт! Ми знімаємо відео про Майнкрафт — челенджі, хоррор-моди та епічні виживання. Тут ви знайдете крутий мерч, щоб підтримати канал.",
  socialLink: 't.me/Helwip'
};

const SIZE_OPTIONS = ['XS','S','M','L','XL','XXL'];

const defaultProducts = [
  {id:'p1', name:'Худі Helwip Blocky', price:1290, desc:'Тепла худі з блоковими персонажами на спині', icon:'🧥'},
  {id:'p2', name:'Футболка Orange Steve', price:590, desc:'Класична бавовняна футболка, оранжевий скін', icon:'👕'},
  {id:'p3', name:'Кепка HW Logo', price:450, desc:'Кепка з вишитим логотипом каналу', icon:'🧢'},
  {id:'p4', name:'Кружка Diamond Pickaxe', price:390, desc:'Керамічна кружка з кайлом з алмазу', icon:'☕'},
  {id:'p5', name:'Плюшевий Крипер', price:690, desc:'М’яка іграшка-крипер 30см', icon:'🧸'},
  {id:'p6', name:'Набір наліпок', price:150, desc:'10 наліпок з персонажами каналу', icon:'✨'}
];

let content = {...defaultContent};
let products = [...defaultProducts];
let cart = {};
let orders = [];
let lastSiteJson = null;
let lastProductsJson = null;
let lastOrdersJson = null;
let editMode = false;
let accounts = {};
let currentUserEmail = null;
let pendingLoginEmail = null;
let pendingCode = null;

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{t.classList.remove('show');}, 2200);
}

async function loadData(){
  try{
    const sJson = await fbGetJson(SITE_KEY);
    if(sJson){
      content = {...defaultContent, ...JSON.parse(sJson)};
      lastSiteJson = sJson;
    } else {
      await saveSite(true);
    }
  }catch(e){
    console.log('site content not found, using defaults', e);
  }
  try{
    const pJson = await fbGetJson(PRODUCTS_KEY);
    if(pJson){
      products = JSON.parse(pJson);
      lastProductsJson = pJson;
    } else {
      await saveProducts(true);
    }
  }catch(e){
    console.log('products not found, using defaults', e);
  }
  try{
    const oJson = await fbGetJson(ORDERS_KEY);
    if(oJson){
      orders = JSON.parse(oJson);
      lastOrdersJson = oJson;
    }
  }catch(e){
    console.log('no orders yet', e);
  }
  try{
    const accJson = await fbGetJson(ACCOUNTS_KEY);
    if(accJson) accounts = JSON.parse(accJson);
  }catch(e){
    console.log('no accounts registered yet', e);
  }
  try{
    const savedEmail = localStorage.getItem('helwip-session');
    if(savedEmail && accounts[savedEmail]){
      currentUserEmail = savedEmail;
    }
  }catch(e){}
  renderAll();
  updateAuthUI();
}

async function saveSite(silent){
  try{
    lastSiteJson = JSON.stringify(content);
    await fbSetJson(SITE_KEY, lastSiteJson);
    if(!silent) showToast('Збережено ✔');
  }catch(e){
    console.error('save site failed', e);
    if(!silent) showToast('Помилка збереження');
  }
}

async function saveProducts(silent){
  try{
    lastProductsJson = JSON.stringify(products);
    await fbSetJson(PRODUCTS_KEY, lastProductsJson);
    if(!silent) showToast('Збережено ✔');
  }catch(e){
    console.error('save products failed', e);
    if(!silent) showToast('Помилка збереження');
  }
}

async function saveOrders(silent){
  try{
    lastOrdersJson = JSON.stringify(orders);
    await fbSetJson(ORDERS_KEY, lastOrdersJson);
    if(!silent) showToast('Збережено ✔');
  }catch(e){
    console.error('save orders failed', e);
    if(!silent) showToast('Помилка збереження замовлення');
  }
}

function renderAll(){
  document.querySelectorAll('.editable[data-key]').forEach(el=>{
    const key = el.dataset.key;
    const span = el.querySelector('[data-text]');
    if(span) span.innerHTML = content[key] ?? '';
  });
  renderProducts();
  renderCartFab();
}

function renderProducts(){
  const grid = document.getElementById('productGrid');
  grid.innerHTML = '';
  products.forEach(p=>{
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.innerHTML = `
      <button class="remove-slot" onclick="event.stopPropagation(); removeProduct('${p.id}')">✕</button>
      <div class="icon">${(p.images && p.images[0]) ? `<img src="${p.images[0]}" alt="${p.name}">` : (p.icon || '📦')}</div>
      <div class="body">
        <div class="pname editable" data-pkey="name" data-id="${p.id}">${p.name}</div>
        <div class="pdesc editable" data-pkey="desc" data-id="${p.id}">${p.desc}</div>
        <div class="pprice editable" data-pkey="price" data-id="${p.id}">${p.price} грн</div>
        <button class="add-btn" onclick="event.stopPropagation(); addToCart('${p.id}')">Додати</button>
      </div>
    `;
    if(!editMode){
      slot.style.cursor = 'pointer';
      slot.addEventListener('click', ()=> openProductPage(p.id));
    }
    grid.appendChild(slot);
  });
  const addSlot = document.createElement('div');
  addSlot.className = 'add-slot';
  addSlot.textContent = '+ Додати товар';
  addSlot.onclick = addProduct;
  grid.appendChild(addSlot);

  document.getElementById('itemCountLabel').textContent = products.length + ' предметів';

  if(editMode) bindProductEdits();
}

function bindProductEdits(){
  document.querySelectorAll('.slot .editable[data-pkey]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      openProductEditModal(el.dataset.id);
    };
  });
}

let ppQty = 1;
let ppActiveImg = 0;
let ppImages = [];
let ppSelectedSize = null;

function openProductPage(id){
  showProductPage(id);
}

function showProductPage(id){
  const p = products.find(x=>x.id===id);
  if(!p){ closeProductPage(); return; }
  ppQty = 1;
  ppActiveImg = 0;
  ppSelectedSize = null;
  const images = (p.images && p.images.length) ? p.images : [];
  ppImages = images;
  document.getElementById('mainView').style.display = 'none';
  const view = document.getElementById('productView');
  view.style.display = 'block';
  view.innerHTML = `
    <div class="product-page">
      <button class="back-btn" onclick="closeProductPage()">← Назад до магазину</button>
      <div class="pp-grid">
        <div class="pp-gallery">
          ${images.length > 1 ? `
            <div class="pp-thumbs" id="ppThumbs">
              ${images.map((src,i)=>`<div class="pp-thumb ${i===0?'active':''}" data-i="${i}" onclick="setPpImage(${i})"><img src="${src}"></div>`).join('')}
            </div>
          `: ''}
          <div class="pp-image" id="ppMainImage">${images[0] ? `<img src="${images[0]}" alt="${p.name}">` : (p.icon || '📦')}</div>
        </div>
        <div class="pp-info">
          <h1 class="pp-name">${p.name}</h1>
          <div class="pp-price">${p.price} грн</div>
          <p class="pp-desc">${p.desc}</p>
          <div class="pp-row">
            <select id="ppQtySelect" class="pp-qty-select" onchange="ppQty=parseInt(this.value)">
              ${Array.from({length:10},(_,i)=>i+1).map(n=>`<option value="${n}">${n}</option>`).join('')}
            </select>
            <button class="mc-btn pp-add" onclick="addToCartFromPage('${p.id}')">Додати в кошик</button>
          </div>
          <div class="pp-accordion">
            <div class="pp-acc-item">
              <div class="pp-acc-head" onclick="toggleAcc(this)"><span>Доставка</span><span class="pp-acc-plus">+</span></div>
              <div class="pp-acc-body">Відправляємо Новою Поштою та Укрпоштою по всій Україні. Термін відправки — 1-3 робочих дні після оформлення замовлення.</div>
            </div>
            ${(p.sizes && Object.keys(p.sizes).length) ? `
            <div class="pp-acc-item open">
              <div class="pp-acc-head" onclick="toggleAcc(this)"><span>Розміри</span><span class="pp-acc-plus">+</span></div>
              <div class="pp-acc-body">
                <div class="pp-sizes" id="ppSizesWrap"></div>
              </div>
            </div>
            ` : ''}
            <div class="pp-acc-item">
              <div class="pp-acc-head" onclick="toggleAcc(this)"><span>Повернення та обмін</span><span class="pp-acc-plus">+</span></div>
              <div class="pp-acc-body">Якщо товар не підійшов — напишіть нам, і ми домовимось про обмін або повернення протягом 14 днів.</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
  renderPpSizes(p);
  window.scrollTo({top:0, behavior:'instant'});
}

function renderPpSizes(p){
  const wrap = document.getElementById('ppSizesWrap');
  if(!wrap || !p.sizes) return;
  wrap.innerHTML = SIZE_OPTIONS.filter(s=>s in p.sizes).map(s=>{
    const avail = !!p.sizes[s];
    const cls = ['pp-size-chip'];
    if(!avail) cls.push('unavailable');
    if(avail && ppSelectedSize === s) cls.push('selected');
    return `<span class="${cls.join(' ')}" ${avail ? `onclick="selectPpSize('${p.id}','${s}')"` : ''}>${s}</span>`;
  }).join('');
}

function selectPpSize(id, s){
  ppSelectedSize = s;
  const p = products.find(x=>x.id===id);
  if(p) renderPpSizes(p);
}

function setPpImage(i){
  ppActiveImg = i;
  document.getElementById('ppMainImage').innerHTML = `<img src="${ppImages[i]}" alt="">`;
  document.querySelectorAll('#ppThumbs .pp-thumb').forEach((el,idx)=>{
    el.classList.toggle('active', idx === i);
  });
}

function toggleAcc(head){
  const item = head.parentElement;
  item.classList.toggle('open');
}

function changePpQty(delta){
  ppQty = Math.max(1, ppQty + delta);
}

function productHasSizes(p){
  return !!(p && p.sizes && Object.keys(p.sizes).some(s=>p.sizes[s]));
}

function cartKey(id, size){
  return size ? `${id}__${size}` : id;
}

function parseCartKey(key){
  const idx = key.indexOf('__');
  if(idx === -1) return {id:key, size:null};
  return {id:key.slice(0, idx), size:key.slice(idx+2)};
}

function addToCartFromPage(id){
  const p = products.find(x=>x.id===id);
  if(productHasSizes(p) && !ppSelectedSize){
    showToast('Оберіть розмір');
    return;
  }
  const qtySelect = document.getElementById('ppQtySelect');
  const qty = qtySelect ? parseInt(qtySelect.value) : 1;
  const key = cartKey(id, ppSelectedSize);
  cart[key] = (cart[key] || 0) + qty;
  renderCartFab();
  showToast(qty > 1 ? `Додано ${qty} шт. в кошик` : 'Додано в кошик');
}

function closeProductPage(){
  document.getElementById('productView').style.display = 'none';
  document.getElementById('productView').innerHTML = '';
  document.getElementById('mainView').style.display = '';
  window.scrollTo({top:0, behavior:'instant'});
}

function renderCartFab(){
  const count = Object.values(cart).reduce((sum,q)=>sum+q, 0);
  const badge = document.getElementById('cartFabCount');
  if(count > 0){
    badge.style.display = 'flex';
    badge.textContent = count > 99 ? '99+' : count;
  } else {
    badge.style.display = 'none';
  }
  renderCartPanel();
}

function addToCart(id){
  const p = products.find(x=>x.id===id);
  if(productHasSizes(p)){
    openProductPage(id);
    showToast('Оберіть розмір');
    return;
  }
  cart[id] = (cart[id] || 0) + 1;
  renderCartFab();
  showToast('Додано в кошик');
}

function toggleCart(){
  document.getElementById('cartPanel').classList.toggle('open');
  document.getElementById('cartBackdrop').classList.toggle('open');
}

function renderCartPanel(){
  const wrap = document.getElementById('cartItems');
  const keys = Object.keys(cart);
  if(keys.length === 0){
    wrap.innerHTML = '<div class="cart-empty">Кошик порожній</div>';
    document.getElementById('cartTotal').textContent = '0 грн';
    return;
  }
  let total = 0;
  wrap.innerHTML = keys.map(key=>{
    const {id, size} = parseCartKey(key);
    const p = products.find(x=>x.id===id);
    if(!p) return '';
    total += p.price * cart[key];
    const sizeLabel = size ? ` <span style="opacity:.7">(${size})</span>` : '';
    return `<div class="cart-row"><span>${p.icon} ${p.name}${sizeLabel} × ${cart[key]}</span><span>${p.price*cart[key]} грн <span class="x" onclick="removeFromCart('${key}')">✕</span></span></div>`;
  }).join('');
  document.getElementById('cartTotal').textContent = total + ' грн';
}

function removeFromCart(key){
  delete cart[key];
  renderCartFab();
}

function checkout(){
  const ids = Object.keys(cart);
  if(ids.length === 0){ showToast('Кошик порожній'); return; }
  openCheckoutForm();
}

function openCheckoutForm(){
  openModal(`
    <h3>Оформлення замовлення</h3>
    <label>Ім'я *</label>
    <input id="custName" placeholder="Як до вас звертатись">
    <label>Телефон *</label>
    <input id="custPhone" placeholder="+380...">
    <label>Служба доставки *</label>
    <select id="custCarrier">
      <option value="">— Оберіть —</option>
      <option value="Нова Пошта">Нова Пошта</option>
      <option value="Укрпошта">Укрпошта</option>
    </select>
    <label>Місто *</label>
    <input id="custCity" placeholder="Наприклад, Київ">
    <label>Номер відділення / адреса *</label>
    <input id="custBranch" placeholder="Наприклад, №25 або адреса">
    <label>Коментар (необов'язково)</label>
    <textarea id="custComment" placeholder="Розмір, колір, побажання..."></textarea>
    <div class="row">
      <button class="mc-btn" style="flex:1" onclick="submitOrder()">Підтвердити</button>
      <button class="mc-btn secondary" style="flex:1" onclick="closeModal()">Скасувати</button>
    </div>
  `);
}

function submitOrder(){
  const name = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  const carrier = document.getElementById('custCarrier').value;
  const city = document.getElementById('custCity').value.trim();
  const branch = document.getElementById('custBranch').value.trim();
  const comment = document.getElementById('custComment').value.trim();

  if(!name){ showToast('Вкажіть ім\'я'); return; }
  if(!phone || phone.replace(/\D/g,'').length < 9){ showToast('Вкажіть коректний телефон'); return; }
  if(!carrier){ showToast('Оберіть службу доставки'); return; }
  if(!city){ showToast('Вкажіть місто'); return; }
  if(!branch){ showToast('Вкажіть номер відділення або адресу'); return; }

  const keys = Object.keys(cart);
  let total = 0;
  const items = keys.map(key=>{
    const {id, size} = parseCartKey(key);
    const p = products.find(x=>x.id===id);
    if(!p) return null;
    total += p.price * cart[key];
    return {id, name:p.name, size: size || null, price:p.price, qty:cart[key]};
  }).filter(Boolean);

  const order = {
    id: 'o' + Date.now(),
    date: new Date().toISOString(),
    name, phone, carrier, city, branch, comment,
    items, total,
    status: 'new'
  };

  orders.unshift(order);
  saveOrders(true);
  sendTelegramNotification(order);

  cart = {};
  renderCartFab();
  document.getElementById('cartPanel').classList.remove('open');
  document.getElementById('cartBackdrop').classList.remove('open');
  closeModal();
  showToast('Дякуємо, ' + name + '! Ми зв\'яжемось з вами 📩');
}

function removeProduct(id){
  if(!editMode) return;
  products = products.filter(p=>p.id!==id);
  saveProducts();
  renderProducts();
}

function addProduct(){
  if(!editMode) return;
  const id = 'p' + Date.now();
  products.push({id, name:'Новий товар', price:100, desc:'Опис товару', icon:'📦'});
  saveProducts();
  renderProducts();
}

function openModal(html){
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalBackdrop').classList.add('open');
}
function closeModal(){
  document.getElementById('modalBackdrop').classList.remove('open');
}

function openTextEditModal(key){

  window._tempProductImages = (p.images && p.images.length) ? [...p.images] : (p.image ? [p.image] : []);
  window._tempSizes = {...(p.sizes || {})};
  openModal(`
    <h3>Редагувати товар</h3>
    <label>Фото товару (можна декілька)</label>
    <div id="pImgList" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px;"></div>
    <input id="pImgFile" type="file" accept="image/*" multiple>
    <label style="margin-top:10px;">Емодзі-іконка (якщо без фото)</label>
    <input id="pIcon" value="${p.icon || '📦'}">
    <label>Назва</label>
    <input id="pName" value="${p.name}">
    <label>Опис</label>
    <textarea id="pDesc">${p.desc}</textarea>
    <label>Ціна (грн)</label>
    <input id="pPrice" type="number" value="${p.price}">
    <label>Розміри — клік перемикає: немає / в наявності / немає в наявності</label>
    <div id="pSizesEditor" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:4px;"></div>
    <div class="row">
      <button class="mc-btn" style="flex:1" onclick="saveProductEdit('${id}')">Зберегти</button>
      <button class="mc-btn secondary" style="flex:1" onclick="closeModal()">Скасувати</button>

  `);

function renderSizesEditor(){
  const wrap = document.getElementById('pSizesEditor');
  if(!wrap) return;
  wrap.innerHTML = SIZE_OPTIONS.map(s=>{
    const state = !(s in window._tempSizes) ? 'off' : (window._tempSizes[s] ? 'on' : 'unavail');
    const bg = state==='on' ? 'var(--green)' : (state==='unavail' ? 'var(--red)' : 'var(--bg-soft)');
    const color = state==='off' ? 'var(--ink-dim)' : '#101010';
    const deco = state==='unavail' ? 'line-through' : 'none';
    return `<span onclick="cycleTempSize('${s}')" style="cursor:pointer; user-select:none; display:inline-flex; align-items:center; justify-content:center; min-width:38px; height:32px; padding:0 8px; border-radius:8px; font-size:12.5px; font-weight:700; background:${bg}; color:${color}; text-decoration:${deco}; border:1px solid var(--border);">${s}</span>`;
  }).join('');
}

function cycleTempSize(s){
  if(!(s in window._tempSizes)){
    window._tempSizes[s] = true;
  } else if(window._tempSizes[s] === true){
    window._tempSizes[s] = false;
  } else {
    delete window._tempSizes[s];
  }
  renderSizesEditor();
}

function renderPImgList(){
  const wrap = document.getElementById('pImgList');
  if(!wrap) return;
  wrap.innerHTML = window._tempProductImages.map((src, i)=>`
    <div style="position:relative; width:64px; height:64px;">
      <img src="${src}" style="width:100%;height:100%;object-fit:cover;border-radius:6px;border:1px solid #373737;">
      <button type="button" onclick="removeTempImage(${i})" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--red);color:#2a0000;border:none;font-size:10px;cursor:pointer;">✕</button>
    </div>
  `).join('') || `<div style="width:64px;height:64px;background:#1c1f28;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#666;">—</div>`;
}

function removeTempImage(i){
  window._tempProductImages.splice(i, 1);
  renderPImgList();
}

function handleProductImageUpload(e){
  const files = Array.from(e.target.files || []);
  if(!files.length) return;
  files.forEach(file=>{
    if(!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxSize = 500;
        let w = img.width, h = img.height;
        if(w > h && w > maxSize){ h = h*(maxSize/w); w = maxSize; }
        else if(h > maxSize){ w = w*(maxSize/h); h = maxSize; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        window._tempProductImages.push(dataUrl);
        renderPImgList();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function saveProductEdit(id){
  const p = products.find(x=>x.id===id);
  if(!p) return;
  p.icon = document.getElementById('pIcon').value || '📦';
  p.name = document.getElementById('pName').value || 'Товар';
  p.desc = document.getElementById('pDesc').value || '';
  p.price = parseInt(document.getElementById('pPrice').value) || 0;
  p.images = [...window._tempProductImages];
  delete p.image;
  p.sizes = {...window._tempSizes};
  saveProducts();
  renderProducts();
  closeModal();
}

function simpleHash(str){
  let hash = 5381;
  for(let i=0;i<str.length;i++){
    hash = ((hash << 5) + hash) + str.charCodeAt(i);
    hash = hash & 0xffffffff;
  }
  return (hash >>> 0).toString(36);
}

function isAdminEmail(email){
  return ADMIN_EMAILS.includes(email);
}

  document.body.classList.add('edit-mode');

function deactivateEditMode(){
  editMode = false;
  document.body.classList.remove('edit-mode');
  document.getElementById('editToggleBtn').classList.remove('on');
  document.getElementById('editToggleBtn').textContent = '✎ Редагувати';
  renderProducts();
}

function updateAuthUI(){
  const authBtn = document.getElementById('authToggleBtn');
  const admin = !!(currentUserEmail && isAdminEmail(currentUserEmail));
  if(currentUserEmail){
    authBtn.textContent = '👤 ' + currentUserEmail + ' · Вийти';
  } else {
    authBtn.textContent = '🔑 Вхід / Реєстрація';
  }
  document.getElementById('editToggleBtn').style.display = admin ? 'inline-block' : 'none';
  document.getElementById('ordersToggleBtn').style.display = admin ? 'inline-block' : 'none';
  document.getElementById('changePassBtn').style.display = currentUserEmail ? 'inline-block' : 'none';
  if(!admin && editMode) deactivateEditMode();
}

function logout(){
  currentUserEmail = null;
  try{ localStorage.removeItem('helwip-session'); }catch(e){}
  updateAuthUI();
  showToast('Вихід виконано');
}

function openAuthModal(){
  openModal(`
    <h3>Вхід або реєстрація</h3>
    <div class="row" style="margin-bottom:10px;">
      <button class="mc-btn secondary on" id="tabLogin" style="flex:1" onclick="switchAuthTab('login')">Вхід</button>
      <button class="mc-btn secondary" id="tabRegister" style="flex:1" onclick="switchAuthTab('register')">Реєстрація</button>
    </div>
    <div id="authFormWrap"></div>
  `);
  switchAuthTab('login');
}

function switchAuthTab(tab){
  const wrap = document.getElementById('authFormWrap');
  document.getElementById('tabLogin').classList.toggle('on', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('on', tab === 'register');
  if(tab === 'login'){
    wrap.innerHTML = `
      <label>Email</label>
      <input id="authEmail" type="email" placeholder="you@example.com">
      <label>Пароль</label>
      <input id="authPass" type="password" placeholder="Пароль">
      <div class="row">
        <button class="mc-btn" style="flex:1" onclick="startLogin()">Увійти</button>
        <button class="mc-btn secondary" style="flex:1" onclick="closeModal()">Скасувати</button>
      </div>
    `;
    setTimeout(()=>{
      const el = document.getElementById('authPass');
      if(el) el.addEventListener('keydown', (e)=>{ if(e.key==='Enter') startLogin(); });
    }, 30);
  } else {
    wrap.innerHTML = `
      <label>Email</label>
      <input id="regEmail" type="email" placeholder="you@example.com">
      <label>Пароль</label>
      <input id="regPass" type="password" placeholder="Мінімум 4 символи">
      <label>Повторіть пароль</label>
      <input id="regPass2" type="password">
      <div class="row">
        <button class="mc-btn" style="flex:1" onclick="doRegister()">Зареєструватись</button>
        <button class="mc-btn secondary" style="flex:1" onclick="closeModal()">Скасувати</button>
      </div>
    `;
  }
}

async function doRegister(){
  const email = document.getElementById('regEmail').value.trim().toLowerCase();
  const p1 = document.getElementById('regPass').value;
  const p2 = document.getElementById('regPass2').value;
  if(!email || !email.includes('@') || !email.includes('.')){ showToast('Введіть коректний email'); return; }
  if(accounts[email]){ showToast('Акаунт з таким email вже існує, увійдіть'); return; }
  if(!p1 || p1.length < 4){ showToast('Пароль має містити хоча б 4 символи'); return; }
  if(p1 !== p2){ showToast('Паролі не співпадають'); return; }
  accounts[email] = simpleHash(email + '::' + p1);
  try{ await fbSetJson(ACCOUNTS_KEY, JSON.stringify(accounts)); }catch(e){}
  showToast('Акаунт створено. Підтвердіть вхід кодом.');
  beginTwoFactor(email);
}

function startLogin(){
  const email = document.getElementById('authEmail').value.trim().toLowerCase();
  const pass = document.getElementById('authPass').value;
  if(!accounts[email]){ showToast('Такого акаунта немає. Зареєструйтесь.'); return; }
  const hash = simpleHash(email + '::' + pass);
  if(accounts[email] !== hash){ showToast('Невірний пароль'); return; }
  beginTwoFactor(email);
}

function generateLocalCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // без схожих символів (0/O, 1/I)
  let code = '';
  for(let i=0;i<6;i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function beginTwoFactor(email){
  pendingLoginEmail = email;
  pendingCode = generateLocalCode();
  openModal(`
    <h3>Підтвердження входу</h3>
    <p style="color:var(--ink-dim); font-size:13px; line-height:1.6;">
      Другий крок входу для ${email}. Введіть код нижче:
    </p>
    <div style="text-align:center; font-size:28px; font-weight:800; letter-spacing:6px; color:var(--orange); margin:14px 0;">${pendingCode}</div>
    <label>Введіть код підтвердження</label>
    <input id="twoFaCode" placeholder="6 символів" maxlength="6" style="text-transform:uppercase;">
    <div class="row">
      <button class="mc-btn" style="flex:1" onclick="confirmTwoFactor()">Підтвердити</button>
      <button class="mc-btn secondary" style="flex:1" onclick="closeModal()">Скасувати</button>
    </div>
  `);
  setTimeout(()=>{
    const el = document.getElementById('twoFaCode');
    if(el){
      el.focus();
      el.addEventListener('keydown', (e)=>{ if(e.key==='Enter') confirmTwoFactor(); });
    }
  }, 30);
}

function confirmTwoFactor(){
  const val = document.getElementById('twoFaCode').value.trim().toUpperCase();
  if(val !== pendingCode){ showToast('Невірний код підтвердження'); return; }
  currentUserEmail = pendingLoginEmail;
  pendingLoginEmail = null;
  pendingCode = null;
  try{ localStorage.setItem('helwip-session', currentUserEmail); }catch(e){}
  closeModal();
  updateAuthUI();
  const admin = isAdminEmail(currentUserEmail);
  showToast(admin ? ('Вітаємо, ' + currentUserEmail + '! Доступ до керування відкрито 🔓') : ('Вітаємо, ' + currentUserEmail + '!'));
}

function openChangePasswordModal(){
  if(!currentUserEmail){ showToast('Спершу увійдіть у акаунт'); return; }
  openModal(`
    <h3>Змінити пароль (${currentUserEmail})</h3>
    <label>Поточний пароль</label>
    <input id="curPass" type="password">
    <label>Новий пароль</label>
    <input id="newPassA" type="password" placeholder="Мінімум 4 символи">
    <label>Повторіть новий пароль</label>
    <input id="newPassB" type="password">

      <button class="mc-btn" style="flex:1" onclick="changeMyPassword()">Змінити</button>
      <button class="mc-btn secondary" style="flex:1" onclick="closeModal()">Скасувати</button>
    </div>
  `);
}

async function changeMyPassword(){
  const cur = document.getElementById('curPass').value;
  const a = document.getElementById('newPassA').value;
  const b = document.getElementById('newPassB').value;
  const curHash = simpleHash(currentUserEmail + '::' + cur);
  if(accounts[currentUserEmail] !== curHash){ showToast('Поточний пароль невірний'); return; }
  if(!a || a.length < 4){ showToast('Новий пароль занадто короткий'); return; }
  if(a !== b){ showToast('Паролі не співпадають'); return; }
  accounts[currentUserEmail] = simpleHash(currentUserEmail + '::' + a);
  try{ await fbSetJson(ACCOUNTS_KEY, JSON.stringify(accounts)); }catch(e){}
  closeModal();
  showToast('Пароль змінено ✔');
}

document.addEventListener('click', (e)=>{

  const editable = e.target.closest('.editable[data-key]');

    openTextEditModal(editable.dataset.key);
  }
});

document.getElementById('editToggleBtn').addEventListener('click', ()=>{
  if(editMode){
    deactivateEditMode();
  } else {
    activateEditMode();
  }
});

document.getElementById('ordersToggleBtn').addEventListener('click', openOrdersView);
document.getElementById('changePassBtn').addEventListener('click', openChangePasswordModal);
document.getElementById('authToggleBtn').addEventListener('click', ()=>{
  if(currentUserEmail){
    logout();
  } else {
    openAuthModal();
  }
});

function openOrdersView(){
  if(orders.length === 0){
    openModal(`<h3>Замовлення</h3><p style="color:var(--ink-dim);">Замовлень ще немає.</p><div class="row"><button class="mc-btn secondary" style="flex:1" onclick="closeModal()">Закрити</button></div>`);
    return;
  }
  const sorted = [...orders].sort((a,b)=> new Date(b.date) - new Date(a.date));
  const rows = sorted.map(o=>{
    const d = new Date(o.date);
    const dateStr = d.toLocaleDateString('uk-UA') + ' ' + d.toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'});
    const itemsCount = o.items.reduce((sum,it)=>sum+it.qty, 0);
    return `
      <div onclick="openOrderDetail('${o.id}')" style="cursor:pointer; border-bottom:1px solid var(--border); padding:12px 4px; transition:background .15s;" onmouseover="this.style.background='var(--card-hover)'" onmouseout="this.style.background='transparent'">
        <div style="display:flex; justify-content:space-between; align-items:baseline; gap:10px;">
          <span style="font-weight:700; color:var(--ink);">${o.name}</span>
          <span style="font-weight:700; color:var(--orange);">${o.total} грн</span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:4px; gap:10px;">
          <span style="color:var(--ink-dim); font-size:12.5px;">${itemsCount} тов. · ${dateStr}</span>
          <span style="color:var(--blue); font-size:12px; font-weight:600;">Деталі →</span>
        </div>
      </div>
    `;
  }).join('');
  openModal(`
    <h3>Замовлення (${orders.length})</h3>
    <div style="max-height:400px; overflow-y:auto;">${rows}</div>
    <div class="row"><button class="mc-btn secondary" style="flex:1" onclick="closeModal()">Закрити</button></div>
  `);
}

function openOrderDetail(id){
  const o = orders.find(x=>x.id===id);
  if(!o){ openOrdersView(); return; }
  const d = new Date(o.date);
  const dateStr = d.toLocaleDateString('uk-UA') + ' ' + d.toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'});
  const itemsHtml = o.items.map(it => `
    <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:14px;">
      <span style="color:var(--ink);">${it.name}${it.size ? ' <span style="color:var(--ink-dim);">('+it.size+')</span>' : ''} <span style="color:var(--ink-dim);">× ${it.qty}</span></span>
      <span style="color:var(--ink); font-weight:600;">${it.price * it.qty} грн</span>
    </div>
  `).join('');

  openModal(`
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:4px;">
      <button onclick="openOrdersView()" style="background:none; border:none; color:var(--ink-dim); font-size:13px; cursor:pointer; padding:0;">← Усі замовлення</button>
    </div>
    <h3 style="margin-bottom:2px;">${o.name}</h3>
    <div style="color:var(--ink-dim); font-size:12.5px; margin-bottom:16px;">${dateStr}</div>

    <div style="background:var(--bg-soft); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; margin-bottom:14px;">
      <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;">
        <span style="color:var(--ink-dim);">Телефон</span>
        <span style="color:var(--ink); font-weight:600;">${o.phone || '—'}</span>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;">
        <span style="color:var(--ink-dim);">Служба доставки</span>
        <span style="color:var(--ink); font-weight:600;">${o.carrier || '—'}</span>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;">
        <span style="color:var(--ink-dim);">Місто</span>
        <span style="color:var(--ink); font-weight:600;">${o.city || '—'}</span>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:13px;">
        <span style="color:var(--ink-dim);">Відділення</span>
        <span style="color:var(--ink); font-weight:600;">${o.branch || '—'}</span>
      </div>
    </div>

    ${o.comment ? `<div style="background:var(--bg-soft); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:14px; font-size:13px; color:var(--ink); font-style:italic;">"${o.comment}"</div>` : ''}

    <div style="font-size:12.5px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px;">Товари</div>
    <div style="margin-bottom:8px;">${itemsHtml}</div>
    <div style="display:flex; justify-content:space-between; font-weight:800; font-size:16px; padding-top:8px;">
      <span>Разом</span><span style="color:var(--orange);">${o.total} грн</span>
    </div>

    <div class="row">
      <button class="mc-btn danger" style="flex:1" onclick="deleteOrder('${o.id}')">Видалити замовлення</button>
    </div>
    <div class="row" style="margin-top:8px;">
      <button class="mc-btn secondary" style="flex:1" onclick="closeModal()">Закрити</button>
    </div>
  `);
}

function deleteOrder(id){
  orders = orders.filter(o=>o.id!==id);
  saveOrders();
  openOrdersView();
}

// Poll for live updates from other viewers/devices when not actively editing
setInterval(async ()=>{
  if(editMode) return;
  try{
    const sJson = await fbGetJson(SITE_KEY);
    if(sJson && sJson !== lastSiteJson){
      content = {...defaultContent, ...JSON.parse(sJson)};
      lastSiteJson = sJson;
      renderAll();
    }
  }catch(e){}
  try{
    const pJson = await fbGetJson(PRODUCTS_KEY);
    if(pJson && pJson !== lastProductsJson){
      products = JSON.parse(pJson);
      lastProductsJson = pJson;
      renderProducts();
    }
  }catch(e){}
  try{
    const oJson = await fbGetJson(ORDERS_KEY);
    if(oJson && oJson !== lastOrdersJson){
      orders = JSON.parse(oJson);
      lastOrdersJson = oJson;
    }
  }catch(e){}
}, 6000);

loadData();
</script>
